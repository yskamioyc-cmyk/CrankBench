# physics_model.toml

[combustion]
intake_temp_k = 293.15           # 吸気絶対温度（20℃に相当）
kappa = 1.4                      # 比熱比の基準値（空気の初期値）
cv_air = 718.0                   # 空気の定積比熱の基準値 (J / kg・K)
r_gas_air = 287.0                # 空気の気体定数 (J / kg・K)

# === 単室数値積分・熱解離・有限燃焼（Wiebe）モデル用パラメータ ===
mixture_heating_value_j_kg = 2.9e6   # 混合気1kgあたりの有効燃焼発熱量 (J/kg)
cv_slope = 0.15                     # 比熱の通常の温度依存勾配 (J/kg・K^2)
mol_increase_ratio = 0.05           # 燃焼によるモル数（分子数）の増加率 (約5%)

# ガス分子の熱解離パラメータ
dissoc_start_temp_k = 2000.0        # 熱解離が顕著化する開始温度 (K)
cv_dissoc_coefficient = 0.0008      # 解離吸熱を模擬する高温域での比熱2次急増係数

# 有限の燃焼期間（Wiebe関数）パラメータ
wiebe_start_angle = 345.0           # 燃焼（点火）開始クランク角 (BTDC 15°に相当)
wiebe_duration = 45.0               # 燃焼期間クランク角 (45度かけて燃焼が進む)
wiebe_efficiency_a = 5.0            # Wiebe効率パラメータ (通常5.0で期間内に99.3%燃焼)
wiebe_shape_m = 2.0                 # Wiebe形状係数 (1.0〜2.0で現実的なS字の熱発生率を形成)

[performance]
base_volumetric_efficiency = 0.85  # 体積効率の基本値
ve_rpm_center = 4500.0             # 体積効率のピーク回転数
ve_rpm_scale = 5000.0              # 体積効率の低下曲線のスケーリング係数
ve_drop_coefficient = 0.25         # 体積効率の高回転での低下係数
base_friction_loss = 0.12          # 基本フリクション損失
friction_rpm_coefficient = 0.000025 # 回転数に応じたフリクション増加係数